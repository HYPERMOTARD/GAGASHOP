<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業尺寸表生成器 - 快速下載版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            background-color: #ffffff;
            padding: 30px;
            color: #333;
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { font-size: 24px; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 30px; }
        
        .selection-area { background: #f9f9f9; padding: 20px; border: 1px solid #eee; margin-bottom: 30px; }
        .group { margin-bottom: 25px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .label { font-weight: bold; color: #555; }
        
        .tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag {
            background: #fff; border: 1px solid #ccc; padding: 6px 16px; border-radius: 4px;
            cursor: pointer; user-select: none; transition: all 0.2s;
        }
        .tag.active { background: #333; color: #fff; border-color: #333; }
        
        .custom-add-box { margin-top: 10px; display: flex; gap: 8px; }
        .custom-input { padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; width: 140px; }
        
        .btn-tool { background: #e5e7eb; color: #374151; padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-add-tag { background: #666; color: white; padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; }

        .btn-global-conv {
            background: #fffbeb; border: 1px solid #fcd34d; color: #b45309;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .btn-global-conv:hover { background: #fef3c7; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #f2f2f2; font-weight: bold; }
        .input-cell { width: 90%; padding: 8px; border: 1px solid #ddd; text-align: center; font-size: 16px; border-radius: 4px; }
        
        .btn-area { margin-top: 30px; display: flex; justify-content: center; }
        .btn-main { padding: 15px 40px; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; font-weight: bold; background: #10b981; color: white; transition: background 0.2s; }
        .btn-main:hover { background: #059669; }

        /* 隱藏渲染用的區域，但不能用 display:none 以免截圖失敗，改用定位移出螢幕 */
        #captureArea { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            padding: 25px; 
            background: white; 
            display: inline-block; 
            width: 800px; /* 固定導出寬度確保排版一致 */
        }
        .final-title { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 15px; letter-spacing: 5px; color: #000; }
        .footer-note { font-size: 12px; color:#666; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>尺寸表快速生成器</h1>
    
    <div class="selection-area">
        <div class="group">
            <div class="header-flex">
                <span class="label">第一步：勾選尺碼 (按順序排列)</span>
                <button class="btn-tool" onclick="clearSelection('size')">一鍵清空尺碼</button>
            </div>
            <div id="sizeTags" class="tags">
                <span class="tag" onclick="toggleSelection(this, 'size')">S</span>
                <span class="tag" onclick="toggleSelection(this, 'size')">M</span>
                <span class="tag" onclick="toggleSelection(this, 'size')">L</span>
                <span class="tag" onclick="toggleSelection(this, 'size')">XL</span>
                <span class="tag" onclick="toggleSelection(this, 'size')">2XL</span>
                <span class="tag" onclick="toggleSelection(this, 'size')">3XL</span>
                <span class="tag" onclick="toggleSelection(this, 'size')">4XL</span>
                <span class="tag" onclick="toggleSelection(this, 'size')">5XL</span>
                <span class="tag" onclick="toggleSelection(this, 'size')">F (均碼)</span>
            </div>
            <div class="custom-add-box">
                <input type="text" id="customSizeInput" class="custom-input" placeholder="新增尺碼">
                <button class="btn-add-tag" onclick="addNewItem('sizeTags', 'customSizeInput', 'size')">＋ 新增</button>
            </div>
        </div>

        <div class="group">
            <div class="header-flex">
                <span class="label">第二步：勾選參數 (按順序排列)</span>
                <button class="btn-tool" onclick="clearSelection('param')">一鍵清空參數</button>
            </div>
            <div id="paramTags" class="tags">
                <span class="tag" onclick="toggleSelection(this, 'param')">衣長</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">胸圍</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">肩寬</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">袖長</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">下擺</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">裙長</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">腰圍</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">臀圍</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">大腿圍</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">褲長</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">建議身高</span>
                <span class="tag" onclick="toggleSelection(this, 'param')">建議體重</span>
            </div>
            <div class="custom-add-box">
                <input type="text" id="customParamInput" class="custom-input" placeholder="新增參數">
                <button class="btn-add-tag" onclick="addNewItem('paramTags', 'customParamInput', 'param')">＋ 新增</button>
            </div>
        </div>
    </div>

    <div class="table-section">
        <div class="header-flex">
            <span class="label">第三步：輸入數據</span>
            <button class="btn-global-conv" onclick="batchConvertWeight()">⚖️ 一鍵將表中【斤】轉為【公斤】</button>
        </div>
        <table id="inputTable">
            <thead id="tHead"></thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>

    <div class="btn-area">
        <button class="btn-main" onclick="generateAndDownload()">直接生成並下載圖片</button>
    </div>

    <div id="captureArea">
        <div class="final-title">尺寸表</div>
        <div id="finalTableContent"></div>
        <p class="footer-note">※ 以上尺寸均為手工平鋪測量，誤差1-3cm屬正常範圍。</p>
    </div>
</div>

<script>
let selectedSizes = [];
let selectedParams = [];

function clearSelection(type) {
    if (type === 'size') {
        selectedSizes = [];
        document.querySelectorAll('#sizeTags .tag').forEach(t => t.classList.remove('active'));
    } else {
        selectedParams = [];
        document.querySelectorAll('#paramTags .tag').forEach(t => t.classList.remove('active'));
    }
    renderInputTable();
}

function toggleSelection(el, type) {
    const val = el.innerText;
    const targetArray = (type === 'size') ? selectedSizes : selectedParams;
    if (el.classList.contains('active')) {
        el.classList.remove('active');
        const index = targetArray.indexOf(val);
        if (index > -1) targetArray.splice(index, 1);
    } else {
        el.classList.add('active');
        targetArray.push(val);
    }
    renderInputTable();
}

function addNewItem(containerId, inputId, type) {
    const input = document.getElementById(inputId);
    const val = input.value.trim();
    if (val) {
        const container = document.getElementById(containerId);
        const newTag = document.createElement('span');
        newTag.className = 'tag';
        newTag.innerText = val;
        newTag.onclick = function() { toggleSelection(this, type); };
        container.appendChild(newTag);
        toggleSelection(newTag, type);
        input.value = '';
    }
}

function batchConvertWeight() {
    let count = 0;
    selectedSizes.forEach(s => {
        selectedParams.forEach(p => {
            if (p.includes('體重')) {
                const input = document.querySelector(`input[data-s="${s}"][data-p="${p}"]`);
                if (input && input.value) {
                    if (input.value.includes('-')) {
                        const parts = input.value.split('-');
                        const res = parts.map(v => (parseFloat(v) / 2).toFixed(0));
                        input.value = res.join('-');
                    } else {
                        input.value = (parseFloat(input.value) / 2).toFixed(1);
                    }
                    count++;
                }
            }
        });
    });
}

function renderInputTable() {
    let head = `<tr><th>尺碼</th>`;
    selectedParams.forEach(p => head += `<th>${p}</th>`);
    head += `</tr>`;
    document.getElementById('tHead').innerHTML = head;
    
    let body = '';
    selectedSizes.forEach(s => {
        body += `<tr><td><strong>${s}</strong></td>`;
        selectedParams.forEach(p => {
            body += `<td><input type="text" class="input-cell" data-s="${s}" data-p="${p}" placeholder="-"></td>`;
        });
        body += `</tr>`;
    });
    document.getElementById('tBody').innerHTML = body;
}

// 核心修改：生成並直接下載
async function generateAndDownload() {
    if(selectedSizes.length === 0 || selectedParams.length === 0) {
        alert("請選擇尺碼與參數！");
        return;
    }

    // 1. 先把內容塞進隱藏的截圖區
    let html = `<table style="width:100%; border-collapse:collapse;"><thead><tr><th style="border:1px solid #333; padding:12px; background:#f2f2f2;">尺碼</th>`;
    selectedParams.forEach(p => {
        let unit = (p.includes("體重")) ? "(kg)" : "(cm)";
        html += `<th style="border:1px solid #333; padding:12px; background:#f2f2f2;">${p}<br><small>${unit}</small></th>`;
    });
    html += `</tr></thead><tbody>`;
    selectedSizes.forEach(s => {
        html += `<tr><td style="border:1px solid #333; padding:12px; font-weight:bold; text-align:center;">${s}</td>`;
        selectedParams.forEach(p => {
            const input = document.querySelector(`input[data-s="${s}"][data-p="${p}"]`);
            const val = input ? input.value : "-";
            html += `<td style="border:1px solid #333; padding:12px; text-align:center;">${val}</td>`;
        });
        html += `</tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('finalTableContent').innerHTML = html;

    // 2. 執行截圖與下載
    const target = document.getElementById('captureArea');
    const canvas = await html2canvas(target, { backgroundColor: "#ffffff", scale: 2 });
    
    const link = document.createElement('a');
    link.download = '尺寸表_' + new Date().getTime() + '.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click();
}
</script>

</body>
</html>
